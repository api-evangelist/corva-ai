aid: corva-ai
name: Corva AI
x-type: company
description: >-
  Corva is a Houston-based AI software company that provides a real-time
  drilling, completions, geoscience, and sustainability analytics platform
  for the oil and gas industry. The Corva platform ingests sensor and rig
  data and exposes it through a RESTful Data API used by E&P operators and
  service companies. Corva Dev Center is an SDK and app hosting environment
  that lets customers build frontend, backend, scheduled, and stream
  applications on top of Corva data assets, with Python and JavaScript SDKs
  and UI component libraries.
