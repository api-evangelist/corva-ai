apis:
  - aid: corva-ai:corva-data-api
    name: Corva Data API
    description: >-
      The Corva Data API is a RESTful interface providing flexibility and
      extensibility into the Corva drilling and completions data platform.
      Use cases include UI visualizations, data entry, replication and sync
      tasks, real-time stream processing, and complex machine learning
      workloads. The API is documented via Swagger UI and accessed with an
      API key.
    humanURL: https://api.corva.ai/documentation/index.html
    baseURL: https://api.corva.ai
    properties:
      - type: Documentation
        url: https://api.corva.ai/documentation/index.html
      - type: DevCenterDocs
        url: https://dc-docs.corva.ai/
      - type: Swagger
        url: https://api.corva.ai/documentation/index.html
    tags:
      - Data API
      - Drilling
      - REST
      - Swagger
  - aid: corva-ai:corva-dev-center-api
    name: Corva Dev Center
    description: >-
      Corva Dev Center is an SDK and app hosting environment for building
      custom applications on top of Corva data assets. It provides Python and
      JavaScript SDKs, UI component libraries, app templates (frontend,
      backend, scheduled, stream, and task apps), cloud deployment tools, and
      a public app marketplace.
    humanURL: https://dc-docs.corva.ai/
    properties:
      - type: Documentation
        url: https://dc-docs.corva.ai/
      - type: GettingStarted
        url: https://dc-docs.corva.ai/docs/Frontend/Getting%20Started/
      - type: PythonSDK
        url: https://dc-docs.corva.ai/docs/Backend/Software%20Development%20Kits/Python/
      - type: GitHub
        url: https://github.com/corva-ai
      - type: Community
        url: https://community.corva.ai/
    tags:
      - Custom Apps
      - Dev Center
      - JavaScript SDK
      - Python SDK
      - SDK
